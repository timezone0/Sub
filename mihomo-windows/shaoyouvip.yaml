- {name: "🇺🇸 美国 01", network: "ws", port: 443, server: "cdns.doon.eu.org", tls: true, type: "vless", uuid: "acc7fd1e-4e63-4c7c-bf73-f7ba18928369", ws-opts: {headers: {Host: "hknb.999111.skin"}, path: "/"}, client-fingerprint: "chrome", servername: "hknb.999111.skin"}
- {client-fingerprint: "chrome", encryption: "none", name: "🇸🇬 新加坡 01", network: "ws", port: 443, server: "store.ubi.com", tls: true, type: "vless", udp: true, uuid: "203d9487-1656-4824-bb09-99c73ecd36c6", ws-opts: {headers: {Host: "zrf-czr.pages.dev", User-Agent: "Mozilla/5.0 (Windows NT 6.1; WOW64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/40.0.2214.115 Safari/537.36"}, path: "/zrf", early-data-header-name: "Sec-WebSocket-Protocol", max-early-data: 2560}, xudp: true, servername: "zrf-czr.pages.dev"}
- {cipher: "aes-256-gcm", name: "🇨🇭 瑞士 01", password: "cdBIDV42DCwnfIN", port: 8119, server: "38.180.161.123", type: "ss", udp: true}
