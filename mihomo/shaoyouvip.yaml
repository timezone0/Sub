log-level: "debug"
mixed-port: 7890
allow-lan: true
external-controller: "127.0.0.1:9090"
external-ui: "ui"
external-ui-name: "yacd"
external-ui-url: "https://ghfast.top/https://github.com/MetaCubeX/Yacd-meta/archive/gh-pages.zip"
unified-delay: true
tcp-concurrent: true
geodata-mode: true
geox-url:
  geoip: "https://ghfast.top/https://github.com/Loyalsoldier/v2ray-rules-dat/releases/latest/download/geoip.dat"
  geosite: "https://ghfast.top/https://github.com/Loyalsoldier/v2ray-rules-dat/releases/latest/download/geosite.dat"
find-process-mode: "strict"
global-client-fingerprint: "chrome"
profile:
  store-selected: true
  store-fake-ip: true
sniffer:
  enable: true
  force-dns-mapping: true
  parse-pure-ip: true
  override-destination: false
  sniff:
    HTTP:
      ports:
      - 80
      - "8080-8880"
      override-destination: true
    TLS:
      ports:
      - 443
      - 8443
    QUIC:
      ports:
      - 443
      - 8443
tun:
  enable: true
  stack: "mixed"
  dns-hijack:
  - "any:53"
  - "tcp://any:53"
  auto-route: true
  auto-redirect: true
  auto-detect-interface: true
  strict-route: true
dns:
  enable: true
  ipv6: false
  enhanced-mode: "fake-ip"
  fake-ip-range: "198.18.0.1/16"
  fake-ip-filter:
  - "geosite:cn,private"
  respect-rules: true
  default-nameserver:
  - "https://223.5.5.5/dns-query"
  - "https://120.53.53.53/dns-query"
  nameserver:
  - "https://dns.google/dns-query"
  nameserver-policy:
    geosite:cn,private:
    - "https://dns.alidns.com/dns-query"
    - "https://doh.pub/dns-query"
  direct-nameserver:
  - "https://dns.alidns.com/dns-query"
  - "https://doh.pub/dns-query"
  proxy-server-nameserver:
  - "https://dns.alidns.com/dns-query"
  - "https://doh.pub/dns-query"
proxies:
- {client-fingerprint: "random", name: "🇺🇸 美国 01", network: "ws", port: 443, server: "154.218.15.198", tls: true, type: "vless", udp: true, uuid: "15235ce9-4cd2-4483-b6b6-7fc4a3f44735", ws-opts: {headers: {Host: "snip.ere.de5.net", User-Agent: "Mozilla/5.0 (Windows NT 6.1; WOW64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/46.0.2490.86 Safari/537.36"}, path: "/", early-data-header-name: "Sec-WebSocket-Protocol", max-early-data: 2560}, xudp: true, servername: "snip.ere.de5.net"}
- {client-fingerprint: "chrome", encryption: "none", name: "🇺🇸 美国 02", network: "ws", port: 443, server: "198.62.62.241", tls: true, type: "vless", udp: true, uuid: "3e2e3c21-3fc8-468f-9ab5-e782bdf5bf97", ws-opts: {headers: {Host: "l.ayovo.netlib.re", User-Agent: "Mozilla/5.0 (Linux; Android 7.1; vivo 1716 Build/N2G47H) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/61.0.3163.98 Mobile Safari/537.36"}, path: "/", early-data-header-name: "Sec-WebSocket-Protocol", max-early-data: 2560}, xudp: true, servername: "l.ayovo.netlib.re"}
